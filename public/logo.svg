<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0A0A0A"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#CCFF00" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#00F2FF" stroke-width="3" opacity="0.5"/>

  <!-- Inner circle -->
  <circle cx="256" cy="256" r="175" fill="#111111"/>

  <!-- Lightning bolt / N shape — NEXUS symbol -->
  <!-- Bold N letterform with cyan accent -->
  <g transform="translate(256,256)">
    <!-- Left vertical bar -->
    <rect x="-78" y="-110" width="44" height="220" rx="8" fill="#CCFF00"/>
    <!-- Diagonal stroke -->
    <polygon points="-78,-110 -34,-110 60,110 16,110" fill="#CCFF00" opacity="0.85"/>
    <!-- Right vertical bar -->
    <rect x="34" y="-110" width="44" height="220" rx="8" fill="#CCFF00"/>
    <!-- Cyan diagonal highlight -->
    <polygon points="-58,-80 -22,-80 44,80 8,80" fill="#00F2FF" opacity="0.4"/>
  </g>

  <!-- Bottom tagline dots -->
  <circle cx="220" cy="410" r="5" fill="#00F2FF" opacity="0.7"/>
  <circle cx="256" cy="410" r="5" fill="#CCFF00" opacity="0.9"/>
  <circle cx="292" cy="410" r="5" fill="#00F2FF" opacity="0.7"/>
</svg>
